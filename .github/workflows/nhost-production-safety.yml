name: Nhost Production Safety

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

concurrency:
  group: nhost-production-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nhost-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Security checks
        run: pnpm check:security

      - name: Package boundaries
        run: pnpm check:package-boundaries

      - name: Authz smoke
        run: pnpm check:authz-smoke

      - name: Storage smoke
        run: pnpm check:storage-smoke

      - name: Ops smoke
        run: pnpm check:ops-smoke

      - name: Production safety composite
        run: pnpm check:production-safety

      - name: End-to-end core loop
        run: pnpm test:e2e
