table:
  name: profiles
  schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - email
        - display_name
        - avatar_url
        - backfill_source
        - backfilled_at
        - created_at
        - updated_at
      filter:
        id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        id:
          _eq: X-Hasura-User-Id
      columns:
        - email
        - display_name
        - avatar_url
      set:
        id: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - email
        - display_name
        - avatar_url
      filter:
        id:
          _eq: X-Hasura-User-Id
      check:
        id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        id:
          _eq: X-Hasura-User-Id
