table:
  schema: public
  name: thread_messages
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - thread_id
        - user_id
        - role
        - content
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: X-Hasura-User-Id
      columns:
        - thread_id
        - role
        - content
update_permissions:
  - role: user
    permission:
      columns:
        - content
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
