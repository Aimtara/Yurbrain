table:
  schema: public
  name: thread_messages
select_permissions:
  - role: user
    permission:
      columns: "*"
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
  - role: service
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: X-Hasura-User-Id
      columns: "*"
  - role: service
    permission:
      check: {}
      columns: "*"
update_permissions:
  - role: user
    permission:
      columns: "*"
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
  - role: service
    permission:
      columns: "*"
      filter: {}
      check: {}
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
  - role: service
    permission:
      filter: {}
