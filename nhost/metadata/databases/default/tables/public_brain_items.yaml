table:
  name: brain_items
  schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - type
        - content_type
        - title
        - raw_content
        - source_app
        - source_link
        - preview_title
        - preview_description
        - preview_image_url
        - note
        - topic_guess
        - recency_weight
        - cluster_key
        - founder_mode_at_capture
        - execution_metadata
        - status
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - user_id
        - type
        - content_type
        - title
        - raw_content
        - source_app
        - source_link
        - preview_title
        - preview_description
        - preview_image_url
        - note
        - topic_guess
        - recency_weight
        - cluster_key
        - founder_mode_at_capture
        - execution_metadata
        - status
      set:
        user_id: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - type
        - content_type
        - title
        - raw_content
        - source_app
        - source_link
        - preview_title
        - preview_description
        - preview_image_url
        - note
        - topic_guess
        - recency_weight
        - cluster_key
        - founder_mode_at_capture
        - execution_metadata
        - status
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
