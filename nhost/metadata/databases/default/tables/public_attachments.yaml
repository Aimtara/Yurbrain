table:
  schema: public
  name: attachments
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - item_id
        - bucket
        - object_key
        - kind
        - mime_type
        - size_bytes
        - sha256
        - metadata
        - status
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: X-Hasura-User-Id
      columns:
        - id
        - item_id
        - bucket
        - object_key
        - kind
        - mime_type
        - size_bytes
        - sha256
        - metadata
        - status
        - created_at
        - updated_at
update_permissions:
  - role: user
    permission:
      columns:
        - kind
        - mime_type
        - size_bytes
        - sha256
        - metadata
        - status
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
