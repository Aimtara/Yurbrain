table:
  schema: public
  name: item_artifacts
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - item_id
        - user_id
        - type
        - payload
        - confidence
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: X-Hasura-User-Id
      columns:
        - id
        - item_id
        - type
        - payload
        - confidence
        - created_at
update_permissions:
  - role: user
    permission:
      columns:
        - type
        - payload
        - confidence
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
