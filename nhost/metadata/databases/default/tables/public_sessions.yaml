table:
  name: sessions
  schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - task_id
        - user_id
        - state
        - started_at
        - ended_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - task_id
        - user_id
        - state
        - started_at
        - ended_at
      set:
        user_id: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - state
        - ended_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
