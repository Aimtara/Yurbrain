table:
  name: user_preferences
  schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - user_id
        - default_lens
        - clean_focus_mode
        - founder_mode
        - render_mode
        - ai_summary_mode
        - feed_density
        - resurfacing_intensity
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - default_lens
        - clean_focus_mode
        - founder_mode
        - render_mode
        - ai_summary_mode
        - feed_density
        - resurfacing_intensity
      set:
        user_id: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - default_lens
        - clean_focus_mode
        - founder_mode
        - render_mode
        - ai_summary_mode
        - feed_density
        - resurfacing_intensity
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
